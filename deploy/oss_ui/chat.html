<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f0" media="(prefers-color-scheme: light)">
<title>MIRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="/oss-assets/marked.min.js"></script>
<script src="/oss-assets/purify.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   RESET & VARIABLES
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --surface: rgba(255,255,255,0.05);
  --border: rgba(0,255,0,0.15);
  --text: #e4eff3;
  --text-dim: #6b6b7b;
  --lime: #0f0;
  --cyan: #0ff;
  --magenta: #c0f;
  --yellow: #ff0;
  --red: #f00;
  --code-bg: rgba(255,255,255,0.06);
}

/* ═══════════════════════════════════════════════
   LIGHT MODE
   ═══════════════════════════════════════════════ */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f0;
    --surface: rgba(0,0,0,0.03);
    --border: rgba(0,100,0,0.15);
    --text: #1a1a1a;
    --text-dim: #666;
    --lime: #006400;
    --cyan: #007070;
    --magenta: #800080;
    --yellow: #8b8000;
    --red: #b00;
    --code-bg: rgba(0,0,0,0.05);
  }
  #compose, #compose:focus-within { filter: none; }
  #send { filter: none; }
  .msg-assistant .msg-content p { text-shadow: none; }
  .modal-content, #auth-form { background: #fff; }
  #auth-overlay { background: var(--bg); }
  .domain-item.enabled { background: rgba(139,128,0,0.05); }
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
body {
  font-family: 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════ */
header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--lime);
  letter-spacing: 3px;
  font-family: 'IBM Plex Mono', monospace;
}
#domain-toggle {
  background: none;
  border: 1px solid rgba(255,255,0,0.1);
  color: var(--text-dim);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
#domain-toggle:hover { border-color: rgba(255,255,0,0.3); color: var(--yellow); }
#domain-toggle.active {
  background: rgba(255,255,0,0.06);
  border-color: rgba(255,255,0,0.4);
  color: var(--yellow);
}
#key-status {
  flex: 1;
  text-align: right;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
}
#key-status:hover { color: var(--lime); }

/* ═══════════════════════════════════════════════
   DOMAIN PANEL
   ═══════════════════════════════════════════════ */
#domain-panel {
  flex-shrink: 0;
  padding: 8px 16px 10px;
  border-bottom: 1px solid rgba(255,255,0,0.1);
}
#domain-panel.hidden { display: none; }
.domain-panel-content {
  max-width: min(80ch, calc(100vw - 32px));
  margin: 0 auto;
}
.domain-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 10px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  margin-bottom: 4px;
}
.domain-item:hover { background: rgba(255,255,255,0.03); }
.domain-item.enabled {
  border-color: rgba(255,255,0,0.3);
  background: rgba(255,255,0,0.03);
}
.domain-item input[type="checkbox"] {
  accent-color: var(--yellow);
  width: 14px;
  height: 14px;
  margin-top: 2px;
  cursor: pointer;
  flex-shrink: 0;
}
.domain-info { flex: 1; min-width: 0; }
.domain-label { font-size: 13px; color: var(--text); }
.domain-desc { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.domain-delete {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.2s;
  flex-shrink: 0;
}
.domain-delete:hover { color: var(--red); }
.domain-create-btn {
  background: none;
  border: 1px solid rgba(255,255,0,0.2);
  color: var(--yellow);
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  margin-top: 6px;
}
.domain-create-btn:hover { border-color: rgba(255,255,0,0.4); }

/* ═══════════════════════════════════════════════
   AUTH OVERLAY
   ═══════════════════════════════════════════════ */
#auth-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#auth-overlay.hidden { display: none; }
#auth-form {
  text-align: center;
  max-width: 400px;
  width: 90%;
  padding: 32px;
  border: 1px solid rgba(192,0,255,0.3);
  border-radius: 10px;
}
#auth-form h2 {
  color: var(--lime);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 3px;
  font-size: 16px;
  margin-bottom: 8px;
}
#auth-form p {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 20px;
}
#auth-form input {
  width: 100%;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid rgba(192,0,255,0.2);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  font-family: 'IBM Plex Mono', monospace;
}
#auth-form input:focus { outline: none; border-color: var(--magenta); }
#auth-form button {
  margin-top: 12px;
  padding: 8px 24px;
  background: var(--lime);
  color: #000;
  border: 1px solid var(--lime);
  border-radius: 5px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
}
#auth-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }

/* ═══════════════════════════════════════════════
   MESSAGES — TERMINAL FLOW
   ═══════════════════════════════════════════════ */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 2%, black 98%, transparent 100%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 2%, black 98%, transparent 100%);
}
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
#messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

#load-more { text-align: center; padding: 12px; }
#load-more button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
}
#load-more button:hover { border-color: var(--lime); color: var(--lime); }

#msg-spacer { flex: 1; }

.msg {
  padding: 14px 20px;
  width: 100%;
  max-width: min(80ch, calc(100vw - 32px));
  margin: 0 auto;
}
.msg-user {
  border-left: 3px solid transparent;
  padding-left: 15px;
}
.msg-assistant {
  border-left: 3px solid var(--lime);
  padding-left: 15px;
}
.msg-role {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 3px;
  font-family: 'IBM Plex Mono', monospace;
}
.msg-user .msg-role { color: var(--text-dim); }
.msg-assistant .msg-role { color: var(--magenta); }
.msg-content {
  font-size: 15px;
  line-height: 1.6;
  word-wrap: break-word;
}
.msg-user .msg-content { white-space: pre-wrap; }
.msg-time {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
}

/* Tool badges */
.msg-tools { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.tool-badge {
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid rgba(0,255,0,0.25);
  border-radius: 3px;
  color: var(--lime);
  font-family: 'IBM Plex Mono', monospace;
  background: rgba(0,255,0,0.04);
}

/* ═══════════════════════════════════════════════
   ASSISTANT MESSAGE — MARKDOWN
   ═══════════════════════════════════════════════ */
.msg-assistant .msg-content p { margin: 0.6em 0; text-shadow: 1px 0px 7px #95959570; }
.msg-assistant .msg-content h1,
.msg-assistant .msg-content h2,
.msg-assistant .msg-content h3,
.msg-assistant .msg-content h4 { margin: 12px 0 6px; color: var(--text); }
.msg-assistant .msg-content h1 { font-size: 1.5em; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 4px; }
.msg-assistant .msg-content h2 { font-size: 1.3em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 3px; }
.msg-assistant .msg-content h3 { font-size: 1.15em; }
.msg-assistant .msg-content h4 { font-size: 1.05em; }
.msg-assistant .msg-content ul, .msg-assistant .msg-content ol { margin: 0.6em 0; padding-left: 1.8em; }
.msg-assistant .msg-content li { margin: 0.2em 0; }
.msg-assistant .msg-content code {
  background: var(--code-bg);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 0.9em;
  font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
}
.msg-assistant .msg-content pre {
  background: var(--code-bg);
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 8px 0;
  border: 1px solid rgba(255,255,255,0.06);
}
.msg-assistant .msg-content pre code { background: none; padding: 0; }
.msg-assistant .msg-content blockquote {
  border-left: 4px solid var(--lime);
  padding: 0.4em 1em;
  background: var(--surface);
  color: var(--text-dim);
  font-style: italic;
  margin: 8px 0;
  border-radius: 0 4px 4px 0;
}
.msg-assistant .msg-content a { color: var(--lime); }
.msg-assistant .msg-content strong { color: var(--text); }
.msg-assistant .msg-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.msg-assistant .msg-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.msg-assistant .msg-content th,
.msg-assistant .msg-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 13px; }
.msg-assistant .msg-content th { background: var(--surface); font-weight: 600; }

/* ═══════════════════════════════════════════════
   LOADING INDICATOR
   ═══════════════════════════════════════════════ */
#loading {
  display: none;
  padding: 8px 20px;
  max-width: min(80ch, calc(100vw - 32px));
  margin: 0 auto;
  flex-shrink: 0;
}
#loading.active { display: block; }
.dots {
  color: var(--cyan);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  letter-spacing: 3px;
}
.dots span { animation: blink 1.4s infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 50% { opacity: 0.15; } }

/* ═══════════════════════════════════════════════
   COMPOSE BAR
   ═══════════════════════════════════════════════ */
#compose-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
#compose {
  position: relative;
  max-width: min(80ch, calc(100vw - 32px));
  margin: 0 auto;
  display: flex;
  border: 1px solid var(--magenta);
  border-radius: 12px;
  padding: 5px 5px 5px 14px;
  filter: drop-shadow(0 0 30px rgba(192,0,255,0.12));
  transition: border-color 0.2s ease, filter 0.2s ease;
}
#compose:focus-within {
  border-color: #00bfff;
  filter: drop-shadow(0 0 30px rgba(0,207,255,0.12));
}
#input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  max-height: 150px;
  line-height: 1.5;
  padding: 7px 65px 7px 0;
}
#input:focus { outline: none; }
#input::placeholder { color: var(--text-dim); }
#send {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  padding: 6px 12px;
  background: var(--lime);
  color: #000;
  border: 1px solid var(--lime);
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
  letter-spacing: 0.5px;
  filter: drop-shadow(0px -1px 20px rgba(0,255,0,0.2));
  transition: all 0.2s;
}
#send:disabled { opacity: 0.25; cursor: not-allowed; filter: none; }

/* ═══════════════════════════════════════════════
   CREATE MODAL
   ═══════════════════════════════════════════════ */
#create-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
#create-modal.hidden { display: none; }
.modal-content {
  background: var(--bg);
  border: 1px solid rgba(192,0,255,0.3);
  border-radius: 10px;
  padding: 24px;
  max-width: 420px;
  width: 90%;
}
.modal-content h3 {
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  margin-bottom: 14px;
  letter-spacing: 1px;
}
.modal-content label {
  display: block;
  color: var(--text-dim);
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal-content label:first-of-type { margin-top: 0; }
.modal-content input,
.modal-content textarea {
  width: 100%;
  padding: 8px 10px;
  background: transparent;
  border: 1px solid rgba(192,0,255,0.2);
  border-radius: 5px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.modal-content textarea { min-height: 50px; resize: vertical; }
.modal-content input:focus,
.modal-content textarea:focus { outline: none; border-color: var(--magenta); }
#create-error { color: var(--red); font-size: 11px; min-height: 16px; margin-top: 6px; }
.modal-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 14px;
}
.modal-buttons button {
  padding: 6px 14px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  transition: all 0.2s;
}
.modal-buttons button:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
#create-btn {
  background: rgba(0,255,0,0.08);
  border-color: rgba(0,255,0,0.3);
  color: var(--lime);
}
#create-btn:hover { background: rgba(0,255,0,0.12); }
#create-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ═══════════════════════════════════════════════
   OSS BANNER
   ═══════════════════════════════════════════════ */
#oss-banner {
  flex-shrink: 0;
  max-width: min(80ch, calc(100vw - 32px));
  margin: 12px auto 0;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}
#oss-banner.hidden { display: none; }
#oss-banner p { margin: 0; }
.banner-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.banner-actions button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  transition: all 0.2s;
}
.banner-actions button:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.banner-actions button:last-child { color: var(--lime); border-color: rgba(0,255,0,0.2); }
.banner-actions button:last-child:hover { border-color: rgba(0,255,0,0.3); }
</style>
</head>
<body>

<header>
  <h1><a href="https://miraos.org/" target="_blank" style="color:var(--lime);text-decoration:none">MIRA</a> <span style="opacity:0.4;font-weight:400">OPEN SOURCE UI</span></h1>
  <button id="domain-toggle" onclick="toggleDomainPanel()"><span id="domain-status">Domains</span></button>
  <span id="key-status" onclick="promptForKey()">No API key</span>
</header>

<div id="domain-panel" class="hidden">
  <div class="domain-panel-content">
    <div id="domain-list"></div>
    <button class="domain-create-btn" onclick="showCreateModal()">+ New Domain</button>
  </div>
</div>

<div id="auth-overlay">
  <div id="auth-form">
    <h2>MIRA</h2>
    <p>Enter your API key to connect. You received this when MIRA first started.</p>
    <input type="password" id="key-input" placeholder="Paste API key..." autofocus>
    <button onclick="submitKey()">Connect</button>
    <div id="auth-error"></div>
  </div>
</div>

<div id="oss-banner" class="hidden">
  <p>This is a basic web UI for the open-source version of MIRA. If you have improvements, please submit them as a PR — I'm open to a community UI.</p>
  <div class="banner-actions">
    <button onclick="dismissBanner(false)">Dismiss</button>
    <button onclick="dismissBanner(true)">Don't show again</button>
  </div>
</div>

<div id="messages">
  <div id="msg-spacer"></div>
  <div id="load-more" style="display:none"><button onclick="loadMore()">Load older messages</button></div>
</div>
<div id="loading"><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>

<div id="compose-area">
  <div id="compose">
    <textarea id="input" rows="1" placeholder="Send a message..." disabled></textarea>
    <button id="send" onclick="send()" disabled>Send</button>
  </div>
</div>

<div id="create-modal" class="hidden">
  <div class="modal-content">
    <h3>New Domain</h3>
    <label>Label</label>
    <input type="text" id="domain-label-input" placeholder="e.g., garden, work_notes">
    <label>Description</label>
    <textarea id="domain-desc-input" rows="2" placeholder="Brief description..."></textarea>
    <div id="create-error"></div>
    <div class="modal-buttons">
      <button onclick="hideCreateModal()">Cancel</button>
      <button id="create-btn" onclick="createDomain()">Create</button>
    </div>
  </div>
</div>

<script>
const API = '/v0/api';
let apiKey = localStorage.getItem('mira_api_key');
let nextOffset = null;
let hasMore = false;
let sending = false;
let domains = [];
let domainPanelOpen = false;

// ─── Auth ───────────────────────────────────────
async function tryAutoLogin() {
  try {
    const r = await fetch('/oss-auth/token');
    if (r.ok) {
      const data = await r.json();
      if (data.token) { apiKey = data.token; localStorage.setItem('mira_api_key', apiKey); return true; }
    }
  } catch {}
  return false;
}

async function checkAuth() {
  if (!apiKey && await tryAutoLogin()) { hideAuth(); return true; }
  if (!apiKey) { showAuth(); return false; }
  try {
    const r = await apiFetch(`${API}/data?type=history&limit=1`);
    if (r.status === 401) { apiKey = null; localStorage.removeItem('mira_api_key'); showAuth(); return false; }
    hideAuth();
    return true;
  } catch { showAuth(); return false; }
}

function showAuth() {
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('input').disabled = true;
  document.getElementById('send').disabled = true;
  document.getElementById('key-status').textContent = 'No API key';
}

function hideAuth() {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('input').disabled = false;
  document.getElementById('send').disabled = false;
  const ks = document.getElementById('key-status');
  ks.textContent = 'Connected';
  ks.style.color = 'var(--lime)';
  ks.style.opacity = '0.6';
  document.getElementById('key-input').value = '';
  document.getElementById('auth-error').textContent = '';
  fetchDomains();
}

async function submitKey() {
  const input = document.getElementById('key-input');
  const key = input.value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem('mira_api_key', key);
  try {
    const r = await apiFetch(`${API}/data?type=history&limit=1`);
    if (r.status === 401) { apiKey = null; localStorage.removeItem('mira_api_key'); document.getElementById('auth-error').textContent = 'Invalid API key'; return; }
    hideAuth();
    loadHistory();
  } catch { document.getElementById('auth-error').textContent = 'Connection failed'; }
}

function promptForKey() {
  apiKey = null;
  localStorage.removeItem('mira_api_key');
  showAuth();
  document.getElementById('key-input').focus();
}

// ─── API Helper ─────────────────────────────────
function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
  return fetch(url, { ...opts, headers });
}

// ─── Content Processing ─────────────────────────
function formatContentBlocks(content) {
  if (!content || typeof content !== 'string') return content;
  const trimmed = content.trimStart();
  if (trimmed[0] !== '[') return content;
  let blocks;
  try { blocks = JSON.parse(trimmed); } catch { return content; }
  if (!Array.isArray(blocks)) return content;

  const parts = [];
  for (const block of blocks) {
    if (!block || typeof block !== 'object') continue;
    if (block.type === 'text' && block.text) {
      parts.push(block.text);
    } else if (block.type === 'tool_use' && block.name) {
      const lines = ['Mira used **' + block.name + '**'];
      if (block.input && typeof block.input === 'object') {
        const entries = Object.entries(block.input);
        entries.forEach(([k, v], i) => {
          const elbow = i === entries.length - 1 ? '\u2514\u2500' : '\u251c\u2500';
          lines.push(elbow + ' ' + k + ': ' + (typeof v === 'string' ? v : JSON.stringify(v)));
        });
      }
      parts.push(lines.join('\n'));
    }
  }
  return parts.join('\n\n') || content;
}

function filterSystemTags(text) {
  if (!text) return text;
  return text
    .replace(/<think>[\s\S]*?<\/think>/gi, '')
    .replace(/<mira:([^>\/\s]+)(?:\s[^>]*)?>[\s\S]*?<\/mira:\1>|<mira:[^>]*\/>/gi, '')
    .replace(/^\[\d{1,2}:\d{2}[ap]m\]\s*/i, '')
    .trim();
}

// ─── Message Rendering ──────────────────────────
function createMsgEl(role, content, timestamp, toolsUsed) {
  const div = document.createElement('div');
  const isUser = role === 'user';
  div.className = 'msg ' + (isUser ? 'msg-user' : 'msg-assistant');

  const roleDiv = document.createElement('div');
  roleDiv.className = 'msg-role';
  roleDiv.textContent = isUser ? 'YOU' : 'MIRA';
  div.appendChild(roleDiv);

  const contentDiv = document.createElement('div');
  contentDiv.className = 'msg-content';
  if (isUser) {
    contentDiv.textContent = content;
  } else {
    const processed = formatContentBlocks(content);
    const filtered = filterSystemTags(processed);
    contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(filtered || ''));
  }
  div.appendChild(contentDiv);

  if (!isUser && toolsUsed && toolsUsed.length > 0) {
    const toolsDiv = document.createElement('div');
    toolsDiv.className = 'msg-tools';
    toolsUsed.forEach(t => {
      const badge = document.createElement('span');
      badge.className = 'tool-badge';
      badge.textContent = t;
      toolsDiv.appendChild(badge);
    });
    div.appendChild(toolsDiv);
  }

  if (timestamp) {
    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.textContent = formatTime(timestamp);
    div.appendChild(timeDiv);
  }
  return div;
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (d.toDateString() === now.toDateString()) return time;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ', ' + time;
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function scrollToBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

// ─── History ────────────────────────────────────
async function loadHistory(offset = 0) {
  try {
    const r = await apiFetch(`${API}/data?type=history&limit=50&offset=${offset}`);
    if (r.status === 401) { promptForKey(); return; }
    const json = await r.json();
    const data = json.data || json;
    const msgs = (data.messages || []).reverse();
    const meta = data.meta || {};
    hasMore = meta.has_more || false;
    nextOffset = meta.next_offset || null;

    const container = document.getElementById('messages');
    const loadMoreEl = document.getElementById('load-more');
    loadMoreEl.style.display = hasMore ? 'block' : 'none';

    if (offset === 0) {
      container.querySelectorAll('.msg').forEach(el => el.remove());
    }

    const insertBefore = offset > 0 ? loadMoreEl.nextSibling : null;
    msgs.forEach(m => {
      const el = createMsgEl(m.role, m.content, m.timestamp);
      if (insertBefore) container.insertBefore(el, insertBefore);
      else container.appendChild(el);
    });

    if (offset === 0) scrollToBottom();
  } catch (e) { console.error('History load failed:', e); }
}

function loadMore() { if (nextOffset != null) loadHistory(nextOffset); }

// ─── Send Message ───────────────────────────────
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send').disabled = true;

  if (domainPanelOpen) toggleDomainPanel();

  const container = document.getElementById('messages');
  container.appendChild(createMsgEl('user', text, new Date().toISOString()));
  scrollToBottom();

  document.getElementById('loading').classList.add('active');

  try {
    const r = await apiFetch(`${API}/chat`, {
      method: 'POST',
      body: JSON.stringify({ message: text })
    });
    if (r.status === 401) { promptForKey(); return; }
    const json = await r.json();
    const response = json.data?.response || json.response || 'No response';
    const toolsUsed = json.data?.metadata?.tools_used || [];
    container.appendChild(createMsgEl('assistant', response, new Date().toISOString(), toolsUsed));
    scrollToBottom();
  } catch (e) {
    container.appendChild(createMsgEl('assistant', 'Error: Could not reach MIRA. Check your connection.', null));
    scrollToBottom();
  } finally {
    sending = false;
    document.getElementById('loading').classList.remove('active');
    document.getElementById('send').disabled = false;
    input.focus();
  }
}

// ─── Domain Management ──────────────────────────
async function fetchDomains() {
  try {
    const r = await apiFetch(`${API}/data?type=domaindocs`);
    if (r.status === 401) return;
    const json = await r.json();
    const data = json.data || json;
    domains = data.domaindocs || [];
    updateDomainStatus();
  } catch (e) { console.error('Domain fetch failed:', e); }
}

function updateDomainStatus() {
  const enabled = domains.find(d => d.enabled);
  const statusEl = document.getElementById('domain-status');
  const toggleEl = document.getElementById('domain-toggle');
  if (enabled) {
    statusEl.textContent = enabled.label;
    toggleEl.classList.add('active');
  } else {
    statusEl.textContent = 'Domains';
    toggleEl.classList.remove('active');
  }
}

function toggleDomainPanel() {
  domainPanelOpen = !domainPanelOpen;
  document.getElementById('domain-panel').classList.toggle('hidden', !domainPanelOpen);
  if (domainPanelOpen) renderDomainList();
}

function renderDomainList() {
  const list = document.getElementById('domain-list');
  list.innerHTML = '';
  if (domains.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:6px 0">No domains yet</div>';
    return;
  }
  domains.forEach(d => {
    const item = document.createElement('div');
    item.className = 'domain-item' + (d.enabled ? ' enabled' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!d.enabled;
    cb.addEventListener('change', () => toggleDomainEnabled(d.label, cb.checked));

    const info = document.createElement('div');
    info.className = 'domain-info';
    const lbl = document.createElement('div');
    lbl.className = 'domain-label';
    lbl.textContent = d.label;
    info.appendChild(lbl);
    if (d.description) {
      const desc = document.createElement('div');
      desc.className = 'domain-desc';
      desc.textContent = d.description;
      info.appendChild(desc);
    }

    const del = document.createElement('button');
    del.className = 'domain-delete';
    del.textContent = '\u00d7';
    del.title = 'Delete';
    del.addEventListener('click', () => deleteDomain(d.label));

    item.appendChild(cb);
    item.appendChild(info);
    item.appendChild(del);
    list.appendChild(item);
  });
}

async function toggleDomainEnabled(label, enable) {
  try {
    await apiFetch(`${API}/actions`, {
      method: 'POST',
      body: JSON.stringify({ domain: 'domain_knowledge', action: enable ? 'enable' : 'disable', data: { label } })
    });
    await fetchDomains();
    renderDomainList();
  } catch (e) { console.error('Toggle failed:', e); }
}

async function deleteDomain(label) {
  if (!confirm('Delete domain "' + label + '"? This cannot be undone.')) return;
  try {
    await apiFetch(`${API}/actions`, {
      method: 'POST',
      body: JSON.stringify({ domain: 'domain_knowledge', action: 'delete', data: { label } })
    });
    await fetchDomains();
    renderDomainList();
  } catch (e) { console.error('Delete failed:', e); }
}

function showCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  document.getElementById('domain-label-input').focus();
}

function hideCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  document.getElementById('domain-label-input').value = '';
  document.getElementById('domain-desc-input').value = '';
  document.getElementById('create-error').textContent = '';
}

async function createDomain() {
  const raw = document.getElementById('domain-label-input').value.trim();
  const description = document.getElementById('domain-desc-input').value.trim();
  const errorEl = document.getElementById('create-error');

  if (!raw) { errorEl.textContent = 'Label is required'; return; }

  const label = raw.replace(/\s+/g, '_').toLowerCase();
  if (!/^[a-z][a-z0-9_]*$/.test(label)) {
    errorEl.textContent = 'Must start with a letter (lowercase letters, numbers, underscores only)';
    return;
  }
  if (domains.some(d => d.label === label)) {
    errorEl.textContent = '"' + label + '" already exists';
    return;
  }

  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  try {
    await apiFetch(`${API}/actions`, {
      method: 'POST',
      body: JSON.stringify({ domain: 'domain_knowledge', action: 'create', data: { label, description: description || label } })
    });
    hideCreateModal();
    await fetchDomains();
    renderDomainList();
  } catch (e) {
    errorEl.textContent = 'Failed to create domain';
  } finally { btn.disabled = false; }
}

// ─── Input Handling ─────────────────────────────
const input = document.getElementById('input');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});
document.getElementById('key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitKey();
});
document.getElementById('domain-label-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('domain-desc-input').focus(); }
});
document.getElementById('domain-desc-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); createDomain(); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('create-modal').classList.contains('hidden')) hideCreateModal();
    else if (domainPanelOpen) toggleDomainPanel();
  }
});

// ─── OSS Banner ─────────────────────────────────
function showBannerIfNeeded() {
  if (localStorage.getItem('mira_hide_banner')) return;
  document.getElementById('oss-banner').classList.remove('hidden');
}
function dismissBanner(permanent) {
  document.getElementById('oss-banner').classList.add('hidden');
  if (permanent) localStorage.setItem('mira_hide_banner', '1');
}

// ─── Startup ────────────────────────────────────
(async () => {
  if (await checkAuth()) {
    loadHistory();
    fetchDomains();
    showBannerIfNeeded();
  }
})();
</script>
