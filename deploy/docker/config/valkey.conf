# Valkey configuration for MIRA Docker container

# Binding
bind 127.0.0.1
port 6379

# Persistence
dir /var/lib/valkey
dbfilename dump.rdb

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF persistence (disabled by default, enable for durability)
appendonly no

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Daemonize off for s6 supervision
daemonize no

# TCP keepalive
tcp-keepalive 300
